# ============================================================
# FILE: .github/workflows/trim-audio.yml
# ============================================================

name: Trim Audio + SRT + Final Video

on:
  workflow_dispatch:
    inputs:
      mp3_url:
        description: "Source MP3 URL"
        required: true
        type: string
      image_url:
        description: "Final image URL"
        required: true
        type: string
      output_name:
        description: "Base output filename"
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/anthonykingkruger/ffmpeg-whisper:latest

    steps:
      - name: Show inputs
        run: |
          echo "MP3 URL: ${{ github.event.inputs.mp3_url }}"
          echo "IMAGE URL: ${{ github.event.inputs.image_url }}"
          echo "Output Name: ${{ github.event.inputs.output_name }}"

      - name: Download MP3
        run: |
          set -e
          curl -L -A "Mozilla/5.0" -o input.mp3 "${{ github.event.inputs.mp3_url }}"
          file input.mp3 || true
          ls -lh input.mp3 || true

      - name: Download Image
        run: |
          set -e
          curl -L -A "Mozilla/5.0" -o input_image "${{ github.event.inputs.image_url }}"
          file input_image || true
          ls -lh input_image || true

      - name: Validate MP3
        run: |
          set -e
          if ! file input.mp3 | grep -Eiq "Audio|MPEG|MP3"; then
            echo "Invalid MP3 file"
            exit 1
          fi

      - name: Normalize Image
        run: |
          set -e
          if file input_image | grep -qi 'PNG'; then
            mv input_image image.png
            ffmpeg -y -i image.png -q:v 2 bg.jpg
          elif file input_image | grep -qi 'JPEG'; then
            mv input_image image.jpg
            cp image.jpg bg.jpg
          elif file input_image | grep -qi 'Web/P'; then
            mv input_image image.webp
            ffmpeg -y -i image.webp -q:v 2 bg.jpg
          else
            mv input_image image.jpg
            cp image.jpg bg.jpg
          fi

          file bg.jpg || true
          ls -lh bg.jpg || true

      - name: Trim Audio (remove first 5.5 sec)
        run: |
          set -e
          ffmpeg -y -ss 00:05:05.5 -i input.mp3 -vn -acodec libmp3lame -q:a 2 output.mp3
          file output.mp3 || true
          ls -lh output.mp3 || true

      - name: Generate SRT + TXT + VTT + JSON (Whisper)
        run: |
          set -e
          whisper output.mp3 \
            --model base \
            --task transcribe \
            --language en \
            --output_format all \
            --output_dir .

      - name: Rename Outputs
        run: |
          set -e
          [ -f output.srt ] && mv output.srt transcript_raw.srt || true
          [ -f output.txt ] && mv output.txt transcript.txt || true
          [ -f output.vtt ] && mv output.vtt transcript.vtt || true
          [ -f output.json ] && mv output.json transcript.json || true
          sed -i 's/\r$//' transcript_raw.srt || true
          ls -lh || true

      - name: Clean + Rewrap SRT (Premium CNBC card wrapping)
        run: |
          set -e
          python3 << 'PY'
          import re
          import textwrap
          from pathlib import Path

          inp = Path("transcript_raw.srt")
          outp = Path("transcript.srt")

          if not inp.exists():
              raise SystemExit("transcript_raw.srt not found")

          raw = inp.read_text(encoding="utf-8", errors="ignore").replace("\r", "")
          blocks = re.split(r"\n\s*\n", raw.strip())

          def clean_text(t):
              t = t.replace("\n", " ").strip()
              t = re.sub(r"\s+", " ", t)
              t = re.sub(r"\s+([,.!?;:])", r"\1", t)
              t = t.replace(" ,", ",").replace(" .", ".")
              return t.strip()

          def smart_wrap_card(text, width=26, max_lines=3):
              # First normal wrap
              wrapped = textwrap.wrap(
                  text,
                  width=width,
                  break_long_words=False,
                  break_on_hyphens=False
              )

              if len(wrapped) <= max_lines:
                  return "\n".join(wrapped)

              words = text.split()
              best = None

              # Try balanced 3-line split
              for i in range(1, len(words)-1):
                  for j in range(i+1, len(words)):
                      l1 = " ".join(words[:i]).strip()
                      l2 = " ".join(words[i:j]).strip()
                      l3 = " ".join(words[j:]).strip()

                      if not l1 or not l2 or not l3:
                          continue

                      max_len = max(len(l1), len(l2), len(l3))
                      min_len = min(len(l1), len(l2), len(l3))

                      # safer lengths for 38px font inside 610x280 card
                      if len(l1) <= 30 and len(l2) <= 31 and len(l3) <= 32:
                          score = (max_len - min_len) + abs(len(l2)-len(l1))*0.5 + abs(len(l3)-len(l2))*0.5
                          if best is None or score < best[0]:
                              best = (score, l1, l2, l3)

              if best:
                  return best[1] + "\n" + best[2] + "\n" + best[3]

              # fallback hard wrap
              wrapped = textwrap.wrap(
                  text,
                  width=24,
                  break_long_words=False,
                  break_on_hyphens=False
              )
              return "\n".join(wrapped[:3])

          new_blocks = []
          idx = 1

          for block in blocks:
              lines = [x for x in block.strip().split("\n") if x.strip()]
              if len(lines) < 3:
                  continue

              time_line = lines[1].strip()
              text = clean_text(" ".join(lines[2:]))

              if not text:
                  continue

              text = smart_wrap_card(text, width=26, max_lines=3)
              new_blocks.append(f"{idx}\n{time_line}\n{text}")
              idx += 1

          outp.write_text("\n\n".join(new_blocks) + "\n", encoding="utf-8")
          print("Cleaned transcript.srt written successfully")
          PY

          echo "===== transcript.srt preview ====="
          head -n 120 transcript.srt || true

      - name: Convert SRT to Drawtext Events (pixel-perfect subtitle placement)
        run: |
          set -e
          python3 << 'PY'
          import re
          from pathlib import Path

          srt_path = Path("transcript.srt")
          out_path = Path("subs_filter.txt")

          if not srt_path.exists():
              raise SystemExit("transcript.srt not found")

          raw = srt_path.read_text(encoding="utf-8", errors="ignore").replace("\r", "")
          blocks = re.split(r"\n\s*\n", raw.strip())

          def srt_time_to_sec(t):
              h, m, rest = t.split(":")
              s, ms = rest.split(",")
              return int(h)*3600 + int(m)*60 + int(s) + int(ms)/1000

          def esc_drawtext(s):
              s = s.replace("\\", r"\\\\")
              s = s.replace(":", r"\:")
              s = s.replace("'", r"\'")
              s = s.replace("%", r"\%")
              s = s.replace(",", r"\,")
              s = s.replace("[", r"\[")
              s = s.replace("]", r"\]")
              return s

          filters = []

          # CNBC-style subtitle card area
          box_x = 1100
          box_y = 520
          box_w = 610
          box_h = 280

          # inner safe area
          text_x = 1138
          text_w = 540
          line_h = 46

          # vertical centering positions
          y_one   = box_y + 118
          y_two   = box_y + 95
          y_three = box_y + 72

          for block in blocks:
              lines = [x for x in block.strip().split("\n") if x.strip()]
              if len(lines) < 3:
                  continue

              time_line = lines[1]
              m = re.match(r"(.+?)\s*-->\s*(.+)", time_line)
              if not m:
                  continue

              start = srt_time_to_sec(m.group(1).strip())
              end = srt_time_to_sec(m.group(2).strip())

              txt_lines = lines[2:]
              txt_lines = [esc_drawtext(t.strip()) for t in txt_lines if t.strip()]
              n = len(txt_lines)

              if n == 1:
                  ys = [y_one]
              elif n == 2:
                  ys = [y_two, y_two + line_h]
              else:
                  ys = [y_three, y_three + line_h, y_three + line_h*2]

              for i, t in enumerate(txt_lines[:3]):
                  filters.append(
                      f"drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:"
                      f"text='{t}':"
                      f"fontsize=38:"
                      f"fontcolor=white:"
                      f"line_spacing=8:"
                      f"x={text_x}:"
                      f"y={ys[i]}:"
                      f"shadowcolor=black@0.75:"
                      f"shadowx=2:"
                      f"shadowy=2:"
                      f"enable='between(t,{start:.3f},{end:.3f})'"
                  )

          out_path.write_text(",\n".join(filters), encoding="utf-8")
          print("subs_filter.txt generated successfully")
          PY

          echo "===== subs_filter.txt preview ====="
          head -n 40 subs_filter.txt || true

      - name: Get Duration
        id: duration
        run: |
          set -e
          D=$(ffprobe -v error -show_entries format=duration -of csv=p=0 output.mp3)
          echo "duration=$D" >> $GITHUB_OUTPUT
          echo "Detected duration: $D"

      - name: Create Final Video (Premium CNBC subtitle card)
        run: |
          set -e

          SUB_FILTER=$(cat subs_filter.txt)

          FILTER="[0:v]scale=1920:1080:force_original_aspect_ratio=increase,crop=1920:1080,\
drawbox=x=1100:y=520:w=610:h=280:color=black@0.42:t=fill,\
drawbox=x=1100:y=520:w=610:h=280:color=white@0.08:t=2,\
drawbox=x=1100:y=520:w=610:h=1:color=white@0.10:t=fill,\
${SUB_FILTER}"

          echo "Using filter:"
          echo "$FILTER" > filter_debug.txt
          head -c 3000 filter_debug.txt || true

          ffmpeg -y \
            -loop 1 -framerate 30 -i bg.jpg \
            -i output.mp3 \
            -filter_complex "$FILTER" \
            -c:v libx264 \
            -preset medium \
            -crf 20 \
            -pix_fmt yuv420p \
            -r 30 \
            -t "${{ steps.duration.outputs.duration }}" \
            -c:a aac \
            -b:a 192k \
            -shortest \
            final_video.mp4

          file final_video.mp4 || true
          ls -lh final_video.mp4 || true

      - name: Verify Outputs
        run: |
          set -e
          ls -lh
          test -f output.mp3
          test -f transcript_raw.srt
          test -f transcript.srt
          test -f transcript.txt
          test -f transcript.vtt || true
          test -f transcript.json || true
          test -f subs_filter.txt
          test -f final_video.mp4

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final
          path: |
            output.mp3
            transcript_raw.srt
            transcript.srt
            transcript.txt
            transcript.vtt
            transcript.json
            subs_filter.txt
            filter_debug.txt
            final_video.mp4
