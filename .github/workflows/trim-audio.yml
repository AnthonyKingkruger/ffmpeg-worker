# ============================================================
# FILE: .github/workflows/trim-audio.yml
# ============================================================

name: Trim Audio + SRT + Final Video

on:
  workflow_dispatch:
    inputs:
      mp3_url:
        description: "Source MP3 URL"
        required: true
        type: string
      image_url:
        description: "Final image URL"
        required: true
        type: string
      output_name:
        description: "Base output filename"
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/anthonykingkruger/ffmpeg-whisper:latest

    steps:
      - name: Show inputs
        run: |
          echo "MP3 URL: ${{ github.event.inputs.mp3_url }}"
          echo "IMAGE URL: ${{ github.event.inputs.image_url }}"
          echo "Output Name: ${{ github.event.inputs.output_name }}"

      - name: Download MP3
        run: |
          set -e
          curl -L -A "Mozilla/5.0" -o input.mp3 "${{ github.event.inputs.mp3_url }}"
          file input.mp3 || true
          ls -lh input.mp3 || true

      - name: Download Image
        run: |
          set -e
          curl -L -A "Mozilla/5.0" -o input_image "${{ github.event.inputs.image_url }}"
          file input_image || true
          ls -lh input_image || true

      - name: Validate MP3
        run: |
          set -e
          if ! file input.mp3 | grep -Eiq "Audio|MPEG|MP3"; then
            echo "Invalid MP3 file"
            exit 1
          fi

      - name: Normalize Image
        run: |
          set -e
          if file input_image | grep -qi 'PNG'; then
            mv input_image image.png
            ffmpeg -y -i image.png -q:v 2 bg.jpg
          elif file input_image | grep -qi 'JPEG'; then
            mv input_image image.jpg
            cp image.jpg bg.jpg
          elif file input_image | grep -qi 'Web/P'; then
            mv input_image image.webp
            ffmpeg -y -i image.webp -q:v 2 bg.jpg
          else
            mv input_image image.jpg
            cp image.jpg bg.jpg
          fi

          file bg.jpg || true
          ls -lh bg.jpg || true

      - name: Trim Audio (remove first 5.5 sec)
        run: |
          set -e
          ffmpeg -y -ss 00:00:05.5 -i input.mp3 -vn -acodec libmp3lame -q:a 2 output.mp3
          file output.mp3 || true
          ls -lh output.mp3 || true

      - name: Generate SRT + TXT + VTT + JSON (Whisper)
        run: |
          set -e
          whisper output.mp3 \
            --model base \
            --task transcribe \
            --language en \
            --output_format all \
            --output_dir .

      - name: Rename Outputs
        run: |
          set -e
          [ -f output.srt ] && mv output.srt transcript_raw.srt || true
          [ -f output.txt ] && mv output.txt transcript.txt || true
          [ -f output.vtt ] && mv output.vtt transcript.vtt || true
          [ -f output.json ] && mv output.json transcript.json || true
          sed -i 's/\r$//' transcript_raw.srt || true
          ls -lh || true

      - name: Clean + Rewrap SRT (max 3 lines, subtitle card friendly)
        run: |
          set -e
          python3 << 'PY'
          import re
          import textwrap
          from pathlib import Path

          inp = Path("transcript_raw.srt")
          outp = Path("transcript.srt")

          if not inp.exists():
              raise SystemExit("transcript_raw.srt not found")

          raw = inp.read_text(encoding="utf-8", errors="ignore").replace("\r", "")
          blocks = re.split(r"\n\s*\n", raw.strip())

          def clean_text(t):
              t = t.replace("\n", " ").strip()
              t = re.sub(r"\s+", " ", t)
              t = re.sub(r"\s+([,.!?;:])", r"\1", t)
              t = t.replace(" ,", ",").replace(" .", ".")
              return t.strip()

          def wrap_three_lines_card(text, width=24):
              wrapped = textwrap.wrap(
                  text,
                  width=width,
                  break_long_words=False,
                  break_on_hyphens=False
              )

              if len(wrapped) <= 3:
                  return "\n".join(wrapped)

              words = text.split()
              best = None

              # try balanced 3-line split
              for i in range(1, len(words)-1):
                  for j in range(i+1, len(words)):
                      l1 = " ".join(words[:i])
                      l2 = " ".join(words[i:j])
                      l3 = " ".join(words[j:])

                      if len(l1) <= 26 and len(l2) <= 28 and len(l3) <= 30:
                          score = max(len(l1), len(l2), len(l3)) - min(len(l1), len(l2), len(l3))
                          if best is None or score < best[0]:
                              best = (score, l1, l2, l3)

              if best:
                  return best[1] + "\n" + best[2] + "\n" + best[3]

              # fallback
              lines = textwrap.wrap(text, width=24, break_long_words=False, break_on_hyphens=False)
              return "\n".join(lines[:3])

          new_blocks = []
          idx = 1

          for block in blocks:
              lines = [x for x in block.strip().split("\n") if x.strip()]
              if len(lines) < 3:
                  continue

              time_line = lines[1].strip()
              text = clean_text(" ".join(lines[2:]))

              if not text:
                  continue

              text = wrap_three_lines_card(text, width=24)
              new_blocks.append(f"{idx}\n{time_line}\n{text}")
              idx += 1

          outp.write_text("\n\n".join(new_blocks) + "\n", encoding="utf-8")
          print("Cleaned transcript.srt written successfully")
          PY

          echo "===== transcript.srt preview ====="
          head -n 80 transcript.srt || true

      - name: Convert to ASS (Right Subtitle Card Layout)
        run: |
          set -e
          ffmpeg -y -i transcript.srt transcript.ass

          python3 << 'PY'
          from pathlib import Path

          p = Path("transcript.ass")
          txt = p.read_text(encoding="utf-8", errors="ignore")
          lines = txt.splitlines()
          out = []

          style_replaced = False

          for l in lines:
              if l.startswith("PlayResX:"):
                  out.append("PlayResX: 1920")
              elif l.startswith("PlayResY:"):
                  out.append("PlayResY: 1080")
              elif l.startswith("Style: Default") and not style_replaced:
                  # FONT SAME rakha gaya hai (38)
                  # MarginL/R/V ko black box ke andar fit karne ke liye tune kiya gaya hai
                  out.append("Style: Default,DejaVu Sans,38,&H00FFFFFF,&H00FFFFFF,&H00000000,&H50000000,1,0,0,0,100,100,0,0,1,2,0,1,1135,135,255")
                  style_replaced = True
              else:
                  out.append(l)

          p.write_text("\n".join(out), encoding="utf-8")
          PY

          echo "===== transcript.ass preview ====="
          head -n 50 transcript.ass || true

      - name: Get Duration
        id: duration
        run: |
          set -e
          D=$(ffprobe -v error -show_entries format=duration -of csv=p=0 output.mp3)
          echo "duration=$D" >> $GITHUB_OUTPUT
          echo "Detected duration: $D"

      - name: Create Final Video (Right Safe Subtitle Card)
        run: |
          set -e

          FILTER="[0:v]scale=1920:1080:force_original_aspect_ratio=increase,crop=1920:1080,drawbox=x=1100:y=540:w=610:h=280:color=black@0.42:t=fill,drawbox=x=1100:y=540:w=610:h=280:color=white@0.08:t=2[subbg];[subbg]ass=transcript.ass"

          echo "Using filter:"
          echo "$FILTER"

          ffmpeg -y \
            -loop 1 -framerate 30 -i bg.jpg \
            -i output.mp3 \
            -filter_complex "$FILTER" \
            -c:v libx264 \
            -preset medium \
            -crf 20 \
            -pix_fmt yuv420p \
            -r 30 \
            -t "${{ steps.duration.outputs.duration }}" \
            -c:a aac \
            -b:a 192k \
            -shortest \
            final_video.mp4

          file final_video.mp4 || true
          ls -lh final_video.mp4 || true

      - name: Verify Outputs
        run: |
          set -e
          ls -lh
          test -f output.mp3
          test -f transcript_raw.srt
          test -f transcript.srt
          test -f transcript.ass
          test -f transcript.txt
          test -f final_video.mp4

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final
          path: |
            output.mp3
            transcript_raw.srt
            transcript.srt
            transcript.ass
            transcript.txt
            transcript.vtt
            transcript.json
            final_video.mp4
