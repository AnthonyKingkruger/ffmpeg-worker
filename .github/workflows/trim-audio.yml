# ============================================================
# FILE: .github/workflows/trim-audio.yml
# ============================================================

name: Trim Audio + SRT + Final Video

on:
  workflow_dispatch:
    inputs:
      mp3_url:
        description: "Source MP3 URL"
        required: true
        type: string
      image_url:
        description: "Final image URL"
        required: true
        type: string
      output_name:
        description: "Base output filename"
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/anthonykingkruger/ffmpeg-whisper:latest

    steps:
      - name: Show inputs
        run: |
          echo "MP3 URL: ${{ github.event.inputs.mp3_url }}"
          echo "IMAGE URL: ${{ github.event.inputs.image_url }}"
          echo "Output Name: ${{ github.event.inputs.output_name }}"

      - name: Download MP3
        run: |
          set -e
          curl -L -A "Mozilla/5.0" -o input.mp3 "${{ github.event.inputs.mp3_url }}"

      - name: Download Image
        run: |
          set -e
          curl -L -A "Mozilla/5.0" -o input_image "${{ github.event.inputs.image_url }}"

      - name: Normalize Image
        run: |
          set -e
          if file input_image | grep -qi 'PNG'; then
            mv input_image image.png
            ffmpeg -y -i image.png bg.jpg
          elif file input_image | grep -qi 'JPEG'; then
            mv input_image image.jpg
            cp image.jpg bg.jpg
          else
            mv input_image image.jpg
            cp image.jpg bg.jpg
          fi

      - name: Trim Audio
        run: |
          ffmpeg -y -ss 00:00:05.5 -i input.mp3 -vn -acodec libmp3lame output.mp3

      - name: Generate SRT
        run: |
          whisper output.mp3 \
            --model base \
            --task transcribe \
            --language en \
            --output_format srt \
            --output_dir .

      - name: Rename SRT
        run: |
          mv output.srt transcript.srt

      - name: Clean + Rewrap SRT (2 lines max)
        run: |
          python3 << 'PY'
          import re, textwrap
          from pathlib import Path

          raw = Path("transcript.srt").read_text().replace("\r","")
          blocks = re.split(r"\n\s*\n", raw.strip())

          def wrap(text):
              lines = textwrap.wrap(text, width=28)
              if len(lines) <= 2:
                  return "\n".join(lines)
              mid = len(lines)//2
              return " ".join(lines[:mid]) + "\n" + " ".join(lines[mid:])

          out = []
          i = 1
          for b in blocks:
              parts = b.split("\n")
              if len(parts) < 3: continue
              t = " ".join(parts[2:])
              t = re.sub(r"\s+"," ",t).strip()
              t = wrap(t)
              out.append(f"{i}\n{parts[1]}\n{t}")
              i+=1

          Path("final.srt").write_text("\n\n".join(out))
          PY

      - name: Convert to ASS (Right Bottom + Big Font)
        run: |
          ffmpeg -y -i final.srt final.ass

          python3 << 'PY'
          from pathlib import Path
          p = Path("final.ass")
          txt = p.read_text()
          lines = txt.splitlines()
          out = []

          for l in lines:
              if l.startswith("PlayResX:"):
                  out.append("PlayResX: 1920")
              elif l.startswith("PlayResY:"):
                  out.append("PlayResY: 1080")
              elif l.startswith("Style: Default"):
                  out.append("Style: Default,DejaVu Sans,46,&H00FFFFFF,&H00FFFFFF,&H00000000,&H00000000,1,0,0,0,100,100,0,0,1,2,0,3,80,80,180")
              else:
                  out.append(l)

          p.write_text("\n".join(out))
          PY

      - name: Get Duration
        id: duration
        run: |
          D=$(ffprobe -v error -show_entries format=duration -of csv=p=0 output.mp3)
          echo "duration=$D" >> $GITHUB_OUTPUT

      - name: Create Final Video (NO BOX)
        run: |
          ffmpeg -y \
            -loop 1 -framerate 30 -i bg.jpg \
            -i output.mp3 \
            -vf "scale=1920:1080:force_original_aspect_ratio=increase,crop=1920:1080,ass=final.ass" \
            -c:v libx264 \
            -pix_fmt yuv420p \
            -r 30 \
            -t "${{ steps.duration.outputs.duration }}" \
            -c:a aac \
            -shortest \
            final_video.mp4

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: final
          path: final_video.mp4
