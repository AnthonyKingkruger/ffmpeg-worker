name: Trim Audio

on:
  workflow_dispatch:
    inputs:
      mp3_url:
        required: true
      output_name:
        required: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - run: |
          curl -L -A "Mozilla/5.0" -o input.mp3 "${{ github.event.inputs.mp3_url }}"
          file input.mp3

      - run: |
          ffmpeg -i input.mp3 -ss 00:00:05 -c copy output.mp3

      - uses: actions/upload-artifact@v4
        with:
          name: trimmed
          path: output.mp3
