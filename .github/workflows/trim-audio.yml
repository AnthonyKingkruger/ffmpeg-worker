name: Trim Audio + SRT

on:
  workflow_dispatch:
    inputs:
      mp3_url:
        description: "Source MP3 URL"
        required: true
        type: string
      output_name:
        description: "Base output filename"
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/anthonykingkruger/ffmpeg-whisper:latest

    steps:
      - name: Show inputs
        run: |
          echo "MP3 URL: ${{ github.event.inputs.mp3_url }}"
          echo "Output Name: ${{ github.event.inputs.output_name }}"

      - name: Download MP3
        run: |
          curl -L -A "Mozilla/5.0" -o input.mp3 "${{ github.event.inputs.mp3_url }}"
          echo "===== FILE INFO ====="
          file input.mp3 || true
          ls -lh input.mp3 || true

      - name: Validate MP3
        run: |
          if ! file input.mp3 | grep -Eiq "Audio|MPEG|MP3"; then
            echo "Invalid MP3 file"
            exit 1
          fi

      - name: Remove first 5.5 sec
        run: |
          ffmpeg -y -ss 00:00:05.5 -i input.mp3 -vn -acodec libmp3lame -q:a 2 output.mp3

      - name: Verify trimmed MP3
        run: |
          echo "===== TRIMMED FILE INFO ====="
          file output.mp3 || true
          ls -lh output.mp3 || true
          test -f output.mp3 || (echo "output.mp3 missing" && exit 1)

      - name: Generate SRT + TXT
        run: |
          whisper output.mp3 \
            --model base \
            --task transcribe \
            --language en \
            --output_format all \
            --output_dir .

      - name: Rename outputs nicely
        run: |
          if [ -f "output.srt" ]; then mv output.srt transcript.srt; fi
          if [ -f "output.txt" ]; then mv output.txt transcript.txt; fi
          if [ -f "output.vtt" ]; then mv output.vtt transcript.vtt; fi
          if [ -f "output.json" ]; then mv output.json transcript.json; fi

      - name: Verify outputs
        run: |
          echo "===== OUTPUT FILES ====="
          ls -lh
          test -f output.mp3 || (echo "output.mp3 missing" && exit 1)
          test -f transcript.srt || (echo "transcript.srt missing" && exit 1)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trimmed
          path: |
            output.mp3
            transcript.srt
            transcript.txt
            transcript.vtt
            transcript.json
