name: Trim Audio + SRT

on:
  workflow_dispatch:
    inputs:
      mp3_url:
        description: "Source MP3 URL"
        required: true
      output_name:
        description: "Base output filename"
        required: true
jobs:
  run:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/YOUR_USERNAME/ffmpeg-whisper:latest

    steps:
      - name: Download MP3
        run: |
          curl -L -o input.mp3 "${{ github.event.inputs.mp3_url }}"
          file input.mp3

      - name: Trim first 5.5 sec
        run: |
          ffmpeg -y -ss 00:00:05.5 -i input.mp3 -acodec libmp3lame output.mp3

      - name: Generate SRT (FREE Whisper)
        run: |
          python3 - <<EOF
from faster_whisper import WhisperModel

model = WhisperModel("base", compute_type="int8")

segments, info = model.transcribe("output.mp3")

with open("transcript.srt", "w", encoding="utf-8") as f:
    for i, seg in enumerate(segments, 1):
        start = seg.start
        end = seg.end

        def format_time(t):
            h = int(t // 3600)
            m = int((t % 3600) // 60)
            s = int(t % 60)
            ms = int((t - int(t)) * 1000)
            return f"{h:02}:{m:02}:{s:02},{ms:03}"

        f.write(f"{i}\n")
        f.write(f"{format_time(start)} --> {format_time(end)}\n")
        f.write(seg.text.strip() + "\n\n")
EOF

      - name: Generate TXT
        run: |
          python3 - <<EOF
from faster_whisper import WhisperModel

model = WhisperModel("base", compute_type="int8")

segments, _ = model.transcribe("output.mp3")

with open("transcript.txt", "w", encoding="utf-8") as f:
    for seg in segments:
        f.write(seg.text.strip() + " ")
EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trimmed
          path: |
            output.mp3
            transcript.srt
            transcript.txt
