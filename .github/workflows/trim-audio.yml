name: Trim Audio

on:
  workflow_dispatch:
    inputs:
      audio_base64:
        description: "Base64 encoded MP3"
        required: true
      output_name:
        description: "Output file name"
        required: true
      remove_first_5:
        description: "true = remove first 5 sec, false = keep only first 5 sec"
        required: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Decode MP3
        run: |
          echo "${{ github.event.inputs.audio_base64 }}" | base64 -d > input.mp3
          echo "Input file info:"
          file input.mp3
          ls -lh input.mp3

      - name: Trim Audio
        run: |
          if [ "${{ github.event.inputs.remove_first_5 }}" = "true" ]; then
            echo "Removing first 5 seconds..."
            ffmpeg -i input.mp3 -ss 00:00:05 -c copy output.mp3
          else
            echo "Keeping only first 5 seconds..."
            ffmpeg -i input.mp3 -ss 00:00:00 -to 00:00:05 -c copy output.mp3
          fi

      - name: Show output
        run: |
          file output.mp3
          ls -lh output.mp3

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trimmed
          path: output.mp3
